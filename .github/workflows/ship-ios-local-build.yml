name: 🚀 Ship iOS to TestFlight (Local Build)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      notes:
        description: "Release notes (shown in job summary)"
        required: false
        default: ""

jobs:
  build-and-submit:
    name: Local Build & Submit to TestFlight
    runs-on: macos-15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: 📦 Install dependencies
        working-directory: mobile
        run: npm ci

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 💎 Install fastlane via Bundler
        working-directory: mobile
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3
          bundle binstubs fastlane --path .bundle/bin
          echo "$PWD/.bundle/bin" >> "$GITHUB_PATH"

      - name: 🍫 Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document
          pod --version

      - name: 🔑 Decode Apple API Key
        run: |
          python3 - <<'PY'
          import base64
          import os

          content = os.environ["ASC_API_KEY_CONTENT"]
          with open("/tmp/asc_api_key.p8", "wb") as f:
              f.write(base64.b64decode(content))
          PY
          echo "EXPO_APPLE_APP_STORE_CONNECT_API_KEY_PATH=/tmp/asc_api_key.p8" >> "$GITHUB_ENV"
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}

      - name: 🏗️ Build iOS app locally via EAS
        id: eas-build
        working-directory: mobile
        run: |
          IPA_PATH="$RUNNER_TEMP/52patta-ios-${{ inputs.profile }}.ipa"

          eas build \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --local \
            --non-interactive \
            --output "$IPA_PATH"

          if [ ! -f "$IPA_PATH" ]; then
            echo "ERROR: Expected IPA not found at $IPA_PATH"
            exit 1
          fi

          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$(basename "$IPA_PATH")" >> "$GITHUB_OUTPUT"
          echo "IPA Path: $IPA_PATH"
        env:
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_PATH: /tmp/asc_api_key.p8

      - name: 📤 Submit local IPA to TestFlight
        working-directory: mobile
        run: |
          if [ -z "$ASC_APP_ID" ]; then
            echo "ERROR: ASC_APP_ID repository variable is not set"
            exit 1
          fi

          node -e "const fs = require('fs'); const profile = process.env.PROFILE; const ascAppId = process.env.ASC_APP_ID; const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8')); if (!eas.submit?.[profile]?.ios) { throw new Error('Missing submit configuration for profile: ' + profile); } eas.submit[profile].ios.ascAppId = ascAppId; fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2) + '\n');"

          eas submit \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --path "${{ steps.eas-build.outputs.ipa_path }}" \
            --non-interactive
        env:
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_PATH: /tmp/asc_api_key.p8
          ASC_APP_ID: ${{ vars.ASC_APP_ID }}
          PROFILE: ${{ inputs.profile }}

      - name: 🧹 Clean up API key
        if: always()
        run: rm -f /tmp/asc_api_key.p8

      - name: 📋 Job Summary
        if: success()
        working-directory: mobile
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "## ✅ iOS Local Ship Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Profile** | ${{ inputs.profile }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | $APP_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build mode** | local EAS build on GitHub Actions |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **IPA** | ${{ steps.eas-build.outputs.ipa_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | 52 Patta (in.patta52.app) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **TestFlight group** | ${{ inputs.profile == 'production' && 'External Testers (production)' || 'Internal Testers (staging backend)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Notes** | ${{ inputs.notes }} |" >> "$GITHUB_STEP_SUMMARY"